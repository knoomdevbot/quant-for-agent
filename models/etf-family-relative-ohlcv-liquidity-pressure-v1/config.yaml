model_name: etf-family-relative-ohlcv-liquidity-pressure-v1
issue_id: AR-121
family: etf_liquidity_pressure_mean_reversion
data_source: qfa_alpaca_real_daily_ohlcv
candidate_pool_fixed_before_performance: true
selection_filters:
  min_coverage_fraction: 0.90
  min_bars: 900
  min_trailing_252d_median_dollar_volume: 5000000
lookbacks:
  normalization_days: 60
  volatility_days: 20
  warmup_days: 130
signal_components:
  abnormal_dollar_volume_shock: 0.30
  close_location_pressure: 0.24
  gap_close_residual: 0.18
  range_expansion_signed: 0.16
  return_volume_dislocation: 0.12
family_relative_normalization: median_by_exposure_family
portfolio:
  form: market_neutral_lite
  top_bottom_n: 6
  max_abs_symbol_weight: 0.125
  min_abs_signal: 0.35
  gross_exposure_cap: 1.0
costs_bps:
  primary: 10
  stress: [5, 20]
prohibitions:
  csv: true
  data_csv_argument: true
  daemon: true
  orders: true
