costs_slippage:
  qfa_native_costs_applied: false
  external_one_way_turnover_cost_bps: 5.0
  stress_one_way_turnover_cost_bps: 20.0
controls:
  no_csv_used: true
  no_data_csv_argument_used: true
  no_daemon: true
  no_orders: true
  temporary_db_only: true
