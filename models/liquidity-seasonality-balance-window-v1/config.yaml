model_name: liquidity-seasonality-balance-window-v1
issue_id: AR-038
family: liquidity_seasonality
universe:
  intended: ["AAPL", "MSFT", "NVDA", "AMZN", "META", "GOOGL", "AVGO", "JPM", "LLY", "XOM", "UNH", "COST"]
data:
  intended_source: Alpaca real market data through qfa AlpacaGateway
  latest_real_data_backtest:
    symbols: ["AAPL", "MSFT", "NVDA", "AMZN", "META", "GOOGL", "AVGO", "JPM", "LLY", "XOM", "UNH", "COST"]
    fetch_start: '2019-01-01'
    fetch_end: '2025-12-31'
    main_start: '2024-01-01'
    main_end: '2025-12-31'
    timeframe: 1Day
    data_csv_used: false
parameters:
  selected:
    pre_month_end_business_days: 2
    post_month_start_business_days: 2
    pre_quarter_end_business_days: 4
    post_quarter_start_business_days: 3
    liquidity_window: 20
    momentum_window: 60
    vol_window: 20
    top_n_month: 5
    top_n_quarter: 6
    max_abs_weight: 0.20
