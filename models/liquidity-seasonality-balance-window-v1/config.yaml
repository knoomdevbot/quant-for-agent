    markdown: models/liquidity-seasonality-balance-window-v1/evaluations/latest.md
    run_json: models/liquidity-seasonality-balance-window-v1/evaluations/runs/ar038_qfa_alpaca_real_20260626T091232Z.json
    db_artifact_retained: false
    qfa_run_ids: [1, 2, 3, 4, 5, 6, 7]
    costs_applied: true
    cost_note: 5 bps one-way turnover haircut applied ex-post; qfa native backtester has no transaction-cost hook.
